<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kidovate | Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; }
        body { background-color: #020617; color: white; font-family: sans-serif; }
        
        /* Части робота, которые появляются при ошибках */
        .hg-part { display: none; stroke: #06b6d4; stroke-width: 4; fill: none; stroke-linecap: round; }
        .hg-part.visible { display: block; }
        
        .letter-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .nav-link { color: #64748b; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { color: #06b6d4; }
    </style>
</head>
<body class="p-2 md:p-4">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-6 bg-slate-900 p-4 rounded-3xl border border-slate-800">
        <div class="flex items-center gap-2">
            <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black italic font-comic">K</div>
            <span class="font-comic text-xl uppercase italic">Kidovate Hub</span>
        </div>
        <div class="flex gap-6">
            <a href="index.html" class="nav-link">Studio</a>
            <a href="animator.html" class="nav-link">Animator</a>
            <a href="game.html" class="nav-link active">Arcade</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto py-6 flex flex-col items-center">
        <h1 class="text-3xl font-comic text-cyan-400 uppercase italic mb-2 tracking-widest">Sentinel Assembly</h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase mb-8">Угадай слово, чтобы собрать робота!</p>
        
        <div class="bg-slate-900 p-8 rounded-[3rem] border-4 border-slate-800 shadow-2xl mb-8 w-full flex justify-center max-w-xs">
            <svg width="200" height="250" viewBox="0 0 100 120">
                <path d="M10,110 L90,110 M20,110 L20,10 L60,10 L60,25" stroke="#334155" stroke-width="4" fill="none" />
                
                <circle id="hg-0" class="hg-part" cx="60" cy="35" r="10" /> <line id="hg-1" class="hg-part" x1="60" y1="45" x2="60" y2="80" /> <line id="hg-2" class="hg-part" x1="60" y1="55" x2="40" y2="70" /> <line id="hg-3" class="hg-part" x1="60" y1="55" x2="80" y2="70" /> <line id="hg-4" class="hg-part" x1="60" y1="80" x2="45" y2="105" /> <line id="hg-5" class="hg-part" x1="60" y1="80" x2="75" y2="105" /> </svg>
        </div>

        <div id="word" class="text-4xl font-black tracking-[0.2em] mb-10 text-cyan-500 uppercase font-mono">_ _ _ _ _</div>
        
        <div id="kb" class="grid grid-cols-7 sm:grid-cols-9 gap-2 w-full max-w-md"></div>

        <div id="result" class="mt-8 text-center hidden">
            <p id="msg" class="text-2xl font-black italic mb-4 uppercase"></p>
            <button onclick="start()" class="bg-cyan-500 text-black px-8 py-3 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Новая сборка</button>
        </div>
    </main>

    <script>
        const words = ["ROBOT", "SENTINEL", "CIRCUIT", "CODING", "ENGINEER", "BOOTH", "SENSOR", "BATTERY", "NEURAL", "GEMMA", "AXON", "DUMMY"];
        let sel, g, m;

        function start() {
            sel = words[Math.floor(Math.random() * words.length)];
            g = []; 
            m = 0;
            document.getElementById('result').classList.add('hidden');
            document.querySelectorAll('.hg-part').forEach(p => p.classList.remove('visible'));
            render();
        }

        function render() {
            // Отрисовка слова
            document.getElementById('word').innerText = sel.split('').map(l => g.includes(l) ? l : '_').join(' ');
            
            // Отрисовка кнопок
            const kb = document.getElementById('kb');
            kb.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const b = document.createElement('button');
                b.innerText = l;
                b.disabled = g.includes(l);
                b.className = "bg-slate-800 p-2 py-3 rounded-lg font-black text-xs hover:bg-slate-700 disabled:opacity-20 transition-all active:scale-90";
                b.onclick = () => {
                    g.push(l);
                    if(!sel.includes(l)) {
                        const part = document.getElementById('hg-'+m);
                        if(part) part.classList.add('visible');
                        m++;
                    }
                    render();
                    check();
                };
                kb.appendChild(b);
            });
        }

        function check() {
            const win = sel.split('').every(l => g.includes(l));
            const loss = m >= 6;
            
            if(win || loss) {
                document.getElementById('result').classList.remove('hidden');
                const msg = document.getElementById('msg');
                msg.innerText = win ? "Система онлайн! Робот собран." : "Ошибка системы! Слово: " + sel;
                msg.className = win ? "text-cyan-400 font-black italic" : "text-red-500 font-black italic";
                // Блокируем клавиатуру
                document.querySelectorAll('.letter-btn').forEach(b => b.disabled = true);
            }
        }

        start();
    </script>
</body>
</html>
