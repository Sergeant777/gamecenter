<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kidovate | Comic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; letter-spacing: 0.05em; }
        body { background-color: #020617; color: white; font-family: sans-serif; overflow-x: hidden; touch-action: none; }
        
        #viewport {
            height: 500px;
            width: 100%;
            background-color: #1e293b;
            position: relative;
            border: 8px solid #000;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .movable {
            position: absolute;
            cursor: move;
            z-index: 40;
            user-select: none;
            touch-action: none;
        }
        .movable.selected { 
            outline: 3px dashed #06b6d4; 
            outline-offset: 4px; 
            border-radius: 10px; 
            background: rgba(6, 182, 212, 0.1);
        }
        .movable * { pointer-events: none; }

        .speech-bubble {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 12px 24px; color: black; font-family: 'Bangers', cursive;
            font-size: 1.5rem; text-align: center; text-transform: uppercase;
            box-shadow: 8px 8px 0px #000; z-index: 100; display: none;
            max-width: 80%; pointer-events: none;
        }

        .nav-link { color: #64748b; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { color: #06b6d4; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 md:p-4">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-6 bg-slate-900 p-4 rounded-3xl border border-slate-800">
        <div class="flex items-center gap-2">
            <div class="bg-cyan-500 text-black px-3 py-1 rounded-lg font-black italic font-comic">K</div>
            <span class="font-comic text-xl uppercase italic">Kidovate Hub</span>
        </div>
        <div class="flex gap-6">
            <a href="index.html" class="nav-link active">Studio</a>
            <a href="animator.html" class="nav-link">Animator</a>
            <a href="game.html" class="nav-link">Arcade</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-4 bg-slate-900 p-6 rounded-[40px] border border-slate-800 h-fit">
            <h2 class="font-comic text-2xl text-cyan-400 uppercase">Comic Lab</h2>
            
            <section class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-slate-500">Stickers & Poses</h3>
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="asset-palette"></div>
                <button onclick="document.getElementById('upload').click()" class="w-full bg-slate-800 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-700">Upload Photo</button>
                <input type="file" id="upload" class="hidden" accept="image/*" onchange="handleUpload(event)">
            </section>

            <section class="space-y-4 border-t border-slate-800 pt-4">
                <h3 class="text-[10px] font-black uppercase text-slate-500">Edit Selection</h3>
                <textarea id="script" oninput="updateBubble(this.value)" placeholder="WHAM! POW!..." class="w-full bg-black border-2 border-slate-800 rounded-xl p-3 text-xs font-black uppercase text-white outline-none h-16 resize-none focus:border-cyan-500"></textarea>
                
                <div class="flex gap-2">
                    <button onclick="flip()" class="flex-1 bg-slate-800 p-3 rounded-xl hover:bg-slate-700"><i data-lucide="flip-horizontal" class="w-4 h-4 mx-auto"></i></button>
                    <button onclick="del()" class="flex-1 bg-red-900/20 text-red-500 p-3 rounded-xl border border-red-900/50 hover:bg-red-900/40"><i data-lucide="trash-2" class="w-4 h-4 mx-auto"></i></button>
                </div>
                <div class="space-y-1">
                    <p class="text-[9px] uppercase font-bold text-slate-500">Size</p>
                    <input type="range" id="size" min="0.2" max="3" step="0.1" value="1" oninput="rescale(this.value)" class="w-full accent-cyan-500">
                </div>
            </section>

            <button onclick="save()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 py-5 rounded-3xl text-xl font-black uppercase shadow-xl active:scale-95 transition-all">SAVE PANEL</button>
        </div>

        <div class="lg:col-span-9">
            <div id="viewport" onpointerdown="deselect()">
                <div id="speech-bubble" class="speech-bubble"></div>
                <div id="actor-layer" class="absolute inset-0 pointer-events-none"></div>
                <div class="absolute bottom-8 right-10 opacity-10 font-black italic text-6xl text-white pointer-events-none uppercase font-comic">KIDOVATE</div>
            </div>
            <p class="text-center text-slate-500 text-[10px] mt-4 uppercase font-bold tracking-widest">Double tap to delete • Drag to move</p>
        </div>
    </div>

    <script>
        const ASSETS = [
            { id: 'p1', svg: `<svg viewBox="0 0 100 150"><circle cx="50" cy="22" r="6" fill="#06f"/><rect x="47" y="28" width="6" height="50" fill="#06f"/><path d="M40 78 L40 130 M60 78 L60 130 M30 40 L15 80 M70 40 L85 80" stroke-width="6" stroke="#06f" fill="none"/></svg>` },
            { id: 'pow', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="#f00" stroke="black" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="Bangers" font-size="22" fill="white">POW!</text></svg>` },
            { id: 'boom', svg: `<svg viewBox="0 0 100 100"><path d="M10 50 L30 40 L30 10 L50 30 L70 10 L70 40 L90 50 L70 60 L70 90 L50 70 L30 90 L30 60 Z" fill="#fbbf24" stroke="black" stroke-width="3"/><text x="50" y="55" text-anchor="middle" font-family="Bangers" font-size="18" fill="black">BOOM</text></svg>` }
        ];

        let selected = null, drag = { active: false, x: 0, y: 0, ox: 0, oy: 0 };
        let zCounter = 100;

        function init() {
            lucide.createIcons();
            const palette = document.getElementById('asset-palette');
            ASSETS.forEach(a => {
                const b = document.createElement('button');
                b.className = "shrink-0 w-12 h-12 rounded-xl bg-black border border-slate-800 p-1 hover:border-cyan-500 transition-all";
                b.innerHTML = a.svg; b.onclick = () => addActor(a.svg);
                palette.appendChild(b);
            });
            window.onpointermove = (e) => {
                if(!drag.active || !selected) return;
                const rect = document.getElementById('viewport').getBoundingClientRect();
                selected.style.left = (drag.ox + (e.clientX - drag.x)) + "px";
                selected.style.top = (drag.oy + (e.clientY - drag.y)) + "px";
            };
            window.onpointerup = () => drag.active = false;
        }

        function addActor(content) {
            const el = document.createElement('div'); el.className = "movable"; el.innerHTML = content;
            el.style.left = "100px"; el.style.top = "100px"; el.dataset.s = 1; el.dataset.f = 1;
            el.onpointerdown = (e) => {
                e.stopPropagation(); select(el);
                zCounter++; el.style.zIndex = zCounter;
                drag = { active: true, x: e.clientX, y: e.clientY, ox: el.offsetLeft, oy: el.offsetTop };
            };
            el.ondblclick = () => { el.remove(); selected = null; };
            document.getElementById('actor-layer').appendChild(el); select(el);
        }

        function select(el) { if(selected) selected.classList.remove('selected'); selected = el; selected.classList.add('selected'); document.getElementById('size').value = el.dataset.s; }
        function deselect() { if(selected) selected.classList.remove('selected'); selected = null; }
        function updateBubble(v) { const b = document.getElementById('speech-bubble'); b.innerText = v; b.style.display = v.trim() ? 'block' : 'none'; }
        function rescale(v) { if(selected) { selected.dataset.s = v; apply(); } }
        function flip() { if(selected) { selected.dataset.f *= -1; apply(); } }
        function apply() { selected.style.transform = `scale(${selected.dataset.s * selected.dataset.f}, ${selected.dataset.s})`; }
        function del() { if(selected) { selected.remove(); selected = null; } }
        function handleUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => addActor(`<img src="${ev.target.result}" class="max-w-[180px]">`);
            r.readAsDataURL(f);
        }
        function save() {
            html2canvas(document.getElementById('viewport')).then(canvas => {
                const a = document.createElement('a'); a.download = 'kidovate_panel.png'; a.href = canvas.toDataURL(); a.click();
            });
        }
        init();
    </script>
</body>
</html>
