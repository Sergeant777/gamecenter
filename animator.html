        @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
        .font-comic { font-family: 'Bangers', cursive; }
        body { background-color: #020617; color: white; font-family: sans-serif; overflow-x: hidden; touch-action: none; }
        
        #viewport { 
            height: 450px; width: 100%; background: black; position: relative; 
            border-radius: 40px; border: 8px solid #000; overflow: hidden; 
        }
        
        #camera-feed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; display: none; }
        
        /* Эффект Onion Skin (предыдущий кадр) */
        #onion-skin { 
            position: absolute; inset: 0; z-index: 10; opacity: 0.3; 
            pointer-events: none; display: none; background-size: cover; 
            background-position: center;
        }
        
        .timeline-thumb { 
            width: 80px; height: 100px; background: #1e293b; border-radius: 12px; 
            flex-shrink: 0; overflow: hidden; border: 3px solid #0f172a; 
        }

        #playback-overlay { 
            position: absolute; inset: 0; z-index: 100; background: black; 
            display: none; align-items: center; justify-content: center; 
        }

        .nav-link { color: #64748b; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { color: #06b6d4; }
    </style>
